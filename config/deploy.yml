# Name of your application. Used to uniquely configure containers.
service: finreader

# Name of the container image.
image: links-logic-apps-registry/finreader

# Deploy to these servers.
servers:
  web:
    hosts:
      - apps.linkslogic.dev
  job:
    hosts:
      - apps.linkslogic.dev
    cmd: bundle exec sidekiq

# Enable SSL auto certification via Let's Encrypt.
# If used with Cloudflare, set encryption mode in SSL/TLS setting to "Full" to enable CF-to-app encryption.
proxy:
  ssl: true
  host: www.finreader.co

# Where you keep your container images.
registry:
  server: registry.linkslogic.dev
  username: linkslogicdev
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - DB_PASSWORD
  clear:
    DB_HOST: links-logic-apps-do-user-4459456-0.g.db.ondigitalocean.com
    DB_NAME: finreader_production
    DB_USER: finreader_user
    DB_PORT: "25060"
    REDIS_URL: redis://finreader-redis-queue:6379/0
    CACHE_REDIS_URL: redis://finreader-redis-cache:6379/0
    RAILS_LOG_LEVEL: info
    EDGAR_USER_AGENT: "Finreader admin@finreader.co"

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Bridge fingerprinted assets between versions to avoid hitting 404 on in-flight requests.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64
<% if ENV["CI"] %>
  local: true
  cache:
    type: gha
<% else %>
  remote: ssh://code
  local: false
<% end %>

# Accessory services
accessories:
  redis-queue:
    image: redis:8.0-alpine
    host: apps.linkslogic.dev
    port: "127.0.0.1:6385:6379"
    cmd: "redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction"
    directories:
      - data:/data
  redis-cache:
    image: redis:8.0-alpine
    host: apps.linkslogic.dev
    port: "127.0.0.1:6386:6379"
    cmd: "redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru"
    directories:
      - data:/data
